sv-gmail, sv, llm, "Konfigurera utgående e-post SMTP: värd smtp.gmail.com, användare erik@foretag.se, port 587", -, -, false
tr-gmail, tr, llm, "Giden SMTP yapılandır: sunucu smtp.gmail.com, kullanıcı ahmet@sirket.tr, port 587", -, -, false
pl-interia, pl, llm, "Skonfiguruj pocztę Interia: host poczta.interia.pl, login anna@interia.pl, port 587", -, -, false
en-yahoo, en, llm, "Set up Yahoo SMTP mailbox: host smtp.mail.yahoo.com, account alice@yahoo.com, port 587. Use SMTP_PASSWORD for password_env.", -, -, false
de-ionos, de, llm, "Richte SMTP ein für Ionos: Server smtp.ionos.de, E-Mail hans@firma.de, Port 587", -, -, false
fr-free, fr, llm, "Paramètre SMTP Free : serveur smtp.free.fr, compte jean@free.fr, port 587", -, -, false
es-office365, es, llm, "Configura Office365 SMTP: host smtp.office365.com, usuario carlos@empresa.es, puerto 587", -, -, false
it-gmail, it, llm, "Configura casella SMTP Gmail: server smtp.gmail.com, email lucia@impresa.it, porta 587", -, -, false
pl-op, pl, llm, "Ustaw SMTP Orange: smtp.op.pl, użytkownik tomek@op.pl, port 587", -, -, false
en-sendgrid, en, llm, "Configure SendGrid SMTP relay: host smtp.sendgrid.net, user api@project.io, port 587. Use SMTP_PASSWORD for password_env.", -, -, false
de-webde, de, llm, "SMTP für WEB.DE: Host smtp.web.de, Nutzer lisa@web.de, Port 587", -, -, false
ja-gmail, ja, llm, GmailのSMTPを設定してください。ホスト smtp.gmail.com、ユーザー tanaka@kaisha.jp、ポート 587, -, -, false
zh-qq, zh, llm, 请配置SMTP发件邮箱：服务器 smtp.qq.com，用户 user@qq.com，端口 587, -, -, false
ar-gmail, ar, llm, قم بإعداد SMTP: المضيف smtp.gmail.com، المستخدم ahmed@company.ae، المنفذ 587, -, -, false
ro-gmail, ro, llm, "Configurează SMTP: gazdă smtp.gmail.com, utilizator ion@firma.ro, port 587", -, -, false
