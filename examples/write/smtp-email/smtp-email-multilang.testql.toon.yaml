# SCENARIO: smtp-email-multilang
# TYPE: nlp2env
# VERSION: 1.0
# SOURCE: prompts-multilang.txt

CONFIG[1]{key, value}:
  password_env, SMTP_PASSWORD

PROMPTS[26]{id, lang, source, nl, tool, after, assert_configured}:
pl-gmail, pl, llm, "Ustaw skrzynkę SMTP Gmail: serwer smtp.gmail.com, użytkownik jan@firma.pl, port 587", -, -, false
en-outlook, en, llm, "Configure outgoing mail: SMTP host smtp-mail.outlook.com, user john@company.com, port 587", -, -, false
de-gmx, de, llm, "Bitte SMTP einrichten: Host mail.gmx.net, Benutzer max@muster.de, Port 587", -, -, false
fr-orange, fr, llm, "Configurez la messagerie SMTP : hôte smtp.orange.fr, utilisateur pierre@firma.fr, port 587", -, -, false
es-gmail, es, llm, "Configura el correo saliente SMTP: servidor smtp.gmail.com, usuario ana@empresa.es, puerto 587", -, -, false
it-aruba, it, llm, "Imposta SMTP: host smtps.aruba.it, utente mario@azienda.it, porta 587", -, -, false
pt-sapo, pt, llm, "Configure o SMTP de envio: servidor smtp.sapo.pt, utilizador joao@empresa.pt, porta 587", -, -, false
cs-seznam, cs, llm, "Nastav odchozí SMTP: server smtp.seznam.cz, uživatel jan@firma.cz, port 587", -, -, false
